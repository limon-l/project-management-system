services:
  - type: web
    name: boardflow-api
    env: node
    region: ohio
    plan: starter
    # Keep the repository root available: the API depends on packages/shared.
    # Build filters, rather than rootDir, prevent web-only changes from
    # triggering a backend deploy.
    buildFilter:
      paths:
        - apps/api/**
        - packages/shared/**
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - turbo.json
        - .nvmrc
    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm exec turbo run build --filter=@boardflow/api...
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 3001
      - key: API_HOST
        value: 0.0.0.0
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://project-management-system-web-rho.vercel.app
      - key: MAX_FILE_SIZE
        value: "10485760"
      - key: STORAGE_TYPE
        value: local
      - key: SESSION_MAX_AGE
        value: "604800000"
